<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daksha & Mukul — Roka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg,
        #b4d0e0 0%,
        #c4dce4 12%,
        #d4e8d8 30%,
        #e4f0d8 50%,
        #eef4e4 70%,
        #f4f0e0 100%
      );
      font-family: 'Playfair Display', Georgia, serif;
      color: #2C4222;
    }

    /* ── Botanical header ── */
    .botanical-top {
      width: 100%;
      display: block;
    }

    /* ── Tagline ── */
    .tagline-section {
      text-align: center;
      padding: 0.5rem 2.5rem 0.75rem;
    }

    .tagline-quote {
      font-size: clamp(14px, 3.5vw, 17px);
      font-style: italic;
      color: #3A5A2A;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .families-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: 700;
      color: #2C4222;
      line-height: 1.25;
    }

    .families-text .rust { color: #8B3A1E; }

    .hindi-sub {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      color: #6A8050;
      letter-spacing: 2px;
      margin-top: 0.5rem;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 2rem;
    }
    .divider-line { flex: 1; height: 0.5px; background: #4A7C35; opacity: 0.35; }
    .divider-dot  { width: 5px; height: 5px; border-radius: 50%; background: #6BA348; opacity: 0.6; }

    /* ── Names ── */
    .names-section {
      text-align: center;
      padding: 0.5rem 2rem 0;
    }

    .to-text {
      font-style: italic;
      font-size: 15px;
      color: #6A8050;
      margin-bottom: 0.2rem;
    }

    .names {
      font-size: clamp(32px, 9.5vw, 48px);
      font-weight: 700;
      color: #2C4222;
      line-height: 1.1;
      letter-spacing: 1px;
    }

    .names .rust { color: #8B3A1E; font-weight: 400; font-style: italic; }

    .roka-script {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(52px, 15vw, 70px);
      color: #8B3A1E;
      font-weight: 700;
      line-height: 1.1;
    }

    .roka-hindi {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      color: #6A8050;
      letter-spacing: 2px;
      margin-top: 0.1rem;
    }

    /* ── Date ── */
    .date-section {
      text-align: center;
      padding: 1.5rem 2rem 0.5rem;
    }

    .date-on {
      font-style: italic;
      font-size: 16px;
      color: #6A8050;
      display: block;
      margin-bottom: -0.2rem;
    }

    .date-number {
      font-size: clamp(80px, 24vw, 110px);
      font-weight: 700;
      color: #2C4222;
      line-height: 0.9;
      letter-spacing: -3px;
    }

    .date-number sup {
      font-size: 0.28em;
      font-weight: 400;
      letter-spacing: 0;
      vertical-align: super;
    }

    .date-month {
      font-size: clamp(38px, 11vw, 55px);
      font-weight: 700;
      color: #2C4222;
      letter-spacing: 6px;
      line-height: 1;
    }

    /* ── Details card ── */
    .details-card {
      margin: 1.25rem 1.75rem 0;
      padding: 1.25rem 1.5rem;
      background: rgba(255, 255, 255, 0.45);
      border: 0.5px solid rgba(74, 124, 53, 0.3);
      border-radius: 3px;
      text-align: center;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 13px;
      color: #3A5A2A;
      padding: 0.4rem 0;
    }

    .detail-row + .detail-row {
      border-top: 0.5px solid rgba(74, 124, 53, 0.15);
    }

    .map-link {
      display: inline-block;
      margin-top: 0.9rem;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #8B3A1E;
      text-decoration: none;
      border-bottom: 0.5px solid rgba(139, 58, 30, 0.45);
      padding-bottom: 2px;
    }

    /* ── Wedding coming soon ── */
    .wedding-section {
      text-align: center;
      padding: 2rem 2rem 0.5rem;
      opacity: 0.5;
    }

    .wedding-label {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4A7C35;
      margin-bottom: 0.3rem;
    }

    .wedding-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(40px, 11vw, 54px);
      color: #2C4222;
      font-weight: 600;
    }

    .coming-soon {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #6A8050;
      margin-top: 0.3rem;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 2rem 2rem 2.5rem;
    }

    .domain {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      color: #8AAC70;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

    <path d="M 368 160 C 338 138, 295 133, 272 146" stroke="#4A2810" stroke-width="5" fill="none" stroke-linecap="round"/>

    <path d="M 192 52 C 197 47, 202 47, 207 52" stroke="#1A2E10" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Tagline + families -->
  <div class="tagline-section">
    <p class="tagline-quote">Treasures tucked away for us to find</p>
    <div class="families-text">
      Dixit <span class="rust">&amp;</span> Sachdeva<br>families invite you
    </div>
    <p class="hindi-sub">एक नई शुरुआत</p>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>

  <!-- Names + Roka -->
  <div class="names-section">
    <p class="to-text">to</p>
    <div class="names">DAKSHA <span class="rust">&amp;</span> MUKUL's</div>
    <div class="roka-script">Roka</div>
    <p class="roka-hindi">रोका</p>
  </div>

  <!-- Big date -->
  <div class="date-section">
    <span class="date-on">on</span>
    <div class="date-number">26<sup>th</sup></div>
    <div class="date-month">JULY</div>
  </div>

  <!-- Event details -->
  <div class="details-card">
    <div class="detail-row">
      <span>🕔</span>
      <span>5:00 PM onwards</span>
    </div>
    <div class="detail-row">
      <span>📍</span>
      <span>Apno Ghar, Gurgaon</span>
    </div>
    <a class="map-link" href="https://maps.app.goo.gl/jzLtpnSUDssejTiPA" target="_blank" rel="noopener">View on Maps ↗</a>
  </div>

  <div class="divider" style="margin-top:2rem"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>

  <!-- Wedding -->

    <div class="wedding-title">Wedding</div>
    <p class="coming-soon">Details coming soon</p>
  </div>

  <div class="footer">
    <p class="domain">dakmuk.in</p>

</body>
</html>
