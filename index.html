<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daksha & Mukul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FDF8F3;
      font-family: 'Playfair Display', Georgia, serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 3rem 2rem;
      text-align: center;
    }

    .border-stripe {
      position: fixed;
      left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #C4692A, #E8A44A, #C4692A, #7B3A1E, #E8A44A);
      z-index: 10;
    }
    .border-stripe.top { top: 0; }
    .border-stripe.bottom { bottom: 0; }

    .motif {
      font-size: 20px;
      letter-spacing: 10px;
      opacity: 0.45;
      margin-bottom: 0.75rem;
      color: #C4692A;
    }

    .hindi-sub {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }

    .names {
      font-size: clamp(44px, 13vw, 64px);
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.05;
    }

    .names em {
      font-style: italic;
      color: #B85C1A;
    }

    .ampersand {
      display: block;
      font-style: italic;
      font-size: clamp(28px, 8vw, 40px);
      color: #C4692A;
      margin: 0.05rem 0;
    }

    .tagline {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 1.25rem;
      font-weight: 400;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 1.25rem auto;
    }

    .divider-line {
      width: 50px;
      height: 0.5px;
      background: #C4692A;
      opacity: 0.4;
    }

    .divider-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #C4692A;
      opacity: 0.6;
    }

    .events {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 2.5rem;
      margin: 0.25rem 0;
    }

    .event {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .event-label-hindi {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 1px;
    }

    .event-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .event-sep {
      font-size: 20px;
      color: #ccc;
      padding-top: 10px;
    }

    .coming-soon {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #bbb;
      margin-top: 1.5rem;
    }

    .domain {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px;
      color: #ccc;
      margin-top: 0.4rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #1a1410; }
      .names { color: #f0e8df; }
      .event-name { color: #f0e8df; }
    }
  </style>
</head>
<body>
  <div class="border-stripe top"></div>

  <div class="page">
    <div class="motif" aria-hidden="true">✦ ✦ ✦</div>

    <p class="hindi-sub">एक नई शुरुआत</p>

    <div class="names">
      <em>Daksha</em>
      <span class="ampersand">&</span>
      <em>Mukul</em>
    </div>

    <p class="tagline">are getting married</p>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="events">
      <div class="event">
        <span class="event-label-hindi">रोका</span>
        <span class="event-name">Roka</span>
      </div>
      <div class="event-sep" aria-hidden="true">·</div>
      <div class="event">
        <span class="event-label-hindi">विवाह</span>
        <span class="event-name">Wedding</span>
      </div>
    </div>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p class="coming-soon">Details coming soon</p>
    <p class="domain">dakmuk.in</p>
  </div>

  <div class="border-stripe bottom"></div>
</body>
</html>
