<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daksha & Mukul — Roka</title>
  <meta property="og:title" content="Daksha & Mukul's Roka" />
  <meta property="og:description" content="Dixit & Sachdeva families invite you — 26th July 2026, Apno Ghar, Gurgaon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg,
        #b4d0e0 0%, #c4dce4 10%, #d4e8d8 28%,
        #e4f0d8 50%, #eef4e4 70%, #f4f0e0 100%
      );
      font-family: 'Playfair Display', Georgia, serif;
      color: #2C4222;
    }

    /* ── Botanical header — compact ── */
    .botanical-top { width: 100%; display: block; max-height: 160px; }

    /* ── Hero block ── */
    .hero {
      text-align: center;
      padding: 0.5rem 1.5rem 0;
    }

    .tagline-quote {
      font-size: clamp(12px, 3vw, 15px);
      font-style: italic;
      color: #3A5A2A;
      margin-bottom: 0.6rem;
    }

    .families-text {
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 700;
      color: #2C4222;
      line-height: 1.2;
    }
    .families-text .rust { color: #8B3A1E; }

    .hindi-sub {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px;
      color: #6A8050;
      letter-spacing: 2px;
      margin-top: 0.3rem;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 0.9rem 2rem;
    }
    .divider-line { flex: 1; height: 0.5px; background: #4A7C35; opacity: 0.35; }
    .divider-dot  { width: 5px; height: 5px; border-radius: 50%; background: #6BA348; opacity: 0.6; }

    /* ── Names + Roka ── */
    .names-section { text-align: center; padding: 0 1.5rem; }

    .to-text { font-style: italic; font-size: 13px; color: #6A8050; }

    .names {
      font-size: clamp(28px, 8.5vw, 42px);
      font-weight: 700; color: #2C4222; line-height: 1.1; letter-spacing: 1px;
    }
    .names .rust { color: #8B3A1E; font-weight: 400; font-style: italic; }

    .roka-script {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(48px, 14vw, 64px);
      color: #8B3A1E; font-weight: 700; line-height: 1.05;
    }

    .roka-hindi {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px; color: #6A8050; letter-spacing: 2px;
    }

    /* ── Date ── */
    .date-section { text-align: center; padding: 0.75rem 1.5rem 0; }
    .date-on { font-style: italic; font-size: 14px; color: #6A8050; display: block; }

    .date-number {
      font-size: clamp(64px, 20vw, 90px);
      font-weight: 700; color: #2C4222; line-height: 0.9; letter-spacing: -2px;
    }
    .date-number sup { font-size: 0.28em; font-weight: 400; letter-spacing: 0; vertical-align: super; }

    .date-month {
      font-size: clamp(32px, 10vw, 48px);
      font-weight: 700; color: #2C4222; letter-spacing: 5px; line-height: 1;
    }

    /* ── Countdown ── */
    .countdown-wrap {
      margin: 1rem 1.5rem 0;
      background: rgba(255,255,255,0.5);
      border: 0.5px solid rgba(74,124,53,0.25);
      border-radius: 4px;
      padding: 1rem 1rem 0.75rem;
      text-align: center;
    }

    .countdown-label {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      color: #6A8050; margin-bottom: 0.6rem;
    }

    .countdown-units {
      display: flex; justify-content: center; gap: 0.5rem;
    }

    .countdown-unit {
      display: flex; flex-direction: column; align-items: center;
      min-width: 56px;
    }

    .countdown-num {
      font-size: clamp(28px, 8vw, 36px);
      font-weight: 700; color: #2C4222; line-height: 1;
    }

    .countdown-unit-label {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #6A8050; margin-top: 2px;
    }

    .countdown-sep {
      font-size: 24px; color: #6BA348; opacity: 0.6;
      align-self: flex-start; padding-top: 4px;
    }

    .countdown-done {
      font-size: 14px; font-style: italic; color: #8B3A1E;
      padding: 0.5rem 0;
    }

    /* ── Details card ── */
    .details-card {
      margin: 0.9rem 1.5rem 0;
      padding: 1rem 1.25rem;
      background: rgba(255,255,255,0.45);
      border: 0.5px solid rgba(74,124,53,0.3);
      border-radius: 4px;
      text-align: center;
    }

    .detail-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.6rem;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 13px; color: #3A5A2A;
      padding: 0.4rem 0;
    }
    .detail-row + .detail-row { border-top: 0.5px solid rgba(74,124,53,0.15); }

    /* ── Buttons ── */
    .actions {
      display: flex; flex-direction: column; gap: 0.65rem;
      margin: 1rem 1.5rem 0;
    }

    .btn {
      display: block; width: 100%; padding: 0.75rem 1rem;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; border-radius: 3px;
      cursor: pointer; border: none; text-align: center;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: #2C4222; color: #f0ead8;
    }

    .btn-secondary {
      background: transparent;
      border: 0.5px solid rgba(44,66,34,0.45);
      color: #2C4222;
    }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 1.75rem 2rem 2.5rem;
    }
    .domain {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 11px; color: #8AAC70; letter-spacing: 1px;
    }
  </style>
</head>

        <span class="countdown-num" id="cd-days">--</span>

      </div>
      <span class="countdown-sep">·</span>
      <div class="countdown-unit">

      </div>

  </div>

    <button class="btn btn-secondary" id="cal-btn">Add to Calendar</button>

  <div class="footer"><p class="domain">dakmuk.in</p></div>

  <script>
    // Countdown to 26 July 2026, 17:00 IST (UTC+5:30)
    const target = new Date('2026-07-26T17:00:00+05:30').getTime();

    function tick() {
      const now = Date.now();
      const diff = target - now;
      const el = document.getElementById('countdown');

      if (diff <= 0) {
        el.innerHTML = '<p class="countdown-done">It\'s Roka time! 🎉</p>';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
      document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
      document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
      document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
    }

    tick();
    setInterval(tick, 1000);

    // Add to Calendar — generates an .ics file
    document.getElementById('cal-btn').addEventListener('click', function () {
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'BEGIN:VEVENT',
        'DTSTART;TZID=Asia/Kolkata:20260726T170000',
        'DTEND;TZID=Asia/Kolkata:20260726T210000',
        'SUMMARY:Daksha & Mukul\'s Roka',
        'DESCRIPTION:Dixit & Sachdeva families invite you to the Roka ceremony.',
        'LOCATION:Apno Ghar Resort\\, NH-8\\, Gurgaon',
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');

      const blob = new Blob([ics], { type: 'text/calendar' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'daksha-mukul-roka.ics';
      a.click();
    });
  </script>
